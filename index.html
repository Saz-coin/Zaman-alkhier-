     .premium-card {
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 2px solid transparent;
            background-image: linear-gradient(145deg, #1a1a1a, #0d0d0d), var(--gold-gradient);

     .premium-card:hover {
            transform: perspective(1000px) rotateX(0deg) translateY(-15px) scale(1.02);

                0 25px 50px rgba(0,0,0,0.9),

                inset 0 1px 0 rgba(212, 175, 55, 0.4);

     .btn-gold-outline {
            border: 1px solid var(--gold);
            color: var(--gold);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;

     .btn-gold-outline:hover {
            background: var(--gold);

     .gold-gradient-text {
            background: linear-gradient(to right, #D4AF37, #FBF5E6, #B8941F);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

     .text-gold { color: var(--gold); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
     .animate-fade-in { animation: fadeIn 1s ease-out; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: var(--gold); }
        /* قص النص لسطرين */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        /* تحسين إضافي للموبايل */
        #slider-wrapper {
            touch-action: pan-y;
        }

    <script>
        const SB_URL = 'https://dbkjzpoopvmahoflwkdr.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRia2p6cG9vcHZtYWhvZmx3a2RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTUxNTAsImV4cCI6MjA5MjE5MTE1MH0.r1o_lNyALA2oTV2smlvg15p1ULSzQct_S7AUsgq-u30';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const PHONE = "+96894695338";
        let currentItemTitle = '';

        // دالة لفك الـ JSON المزدوج
        function parseValue(value) {
            let d = value;
            try {
                d = JSON.parse(d);
                if (typeof d === 'string') d = JSON.parse(d);
            } catch(e) {
                console.error('فشل تحويل البيانات:', e);
                d = { title: '', desc: '', details: '', img: '', price: '' };
            }
            return d;
        }

        function formatOMR(price) {
            return new Intl.NumberFormat('ar-OM', {
                style: 'currency',
                currency: 'OMR',
                minimumFractionDigits: 3,
                maximumFractionDigits: 3
            }).format(price);
        }

        // ========== كود السلايدر المصحح ==========
        let sliderState = {
            currentSlide: 0,
            totalSlides: 0,
            isDragging: false,
            startPos: 0,
            currentTranslate: 0,
            prevTranslate: 0,
            animationID: 0,
            autoSlideInterval: null,
            containerWidth: 0,
            startY: 0,
            isScrolling: false
        };

        async function loadSlider() {
            const sliderSection = document.getElementById('main-slider');
            const { data, error } = await sb.from('content').select('*').eq('section', 'slider').order('order');

            if (error ||!data || data.length === 0) {
                sliderSection.style.display = 'none';
                return;
            }

            sliderSection.style.display = 'block';
            sliderState.totalSlides = data.length;
            sliderState.currentSlide = 0;

            const wrapper = document.getElementById('slider-wrapper');
            const dots = document.getElementById('slider-dots');

            // نخزن عرض الحاوية الصح
            sliderState.containerWidth = document.getElementById('main-slider').offsetWidth;

            wrapper.innerHTML = data.map((item, index) => {
                const d = parseValue(item.value);
                const imgUrl = d.img && typeof d.img === 'string' && d.img.startsWith('http')? d.img : '';

                const imageContent = imgUrl
          ? `<img src="${imgUrl}" class="w-full h-full object-cover select-none pointer-events-none" style="background-color: #111;" draggable="false" onerror="this.style.display='none'; this.parentElement.style.backgroundColor='#333';">`
                    : `<div class="w-full h-full bg-[#333] flex items-center justify-center"><span class="text-gray-500 text-sm">لا يوجد صورة</span></div>`;

return `<div class="w-full h-full shrink-0 relative bg-[#111] select-none overflow-hidden" style="flex: 0 0 100%;">
                    ${imageContent}
                    <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/90 via-black/50 to-transparent p-4 md:p-6 pointer-events-none">
                        <h3 class="text-lg md:text-xl font-bold text-white" style="font-family: 'Cairo';">${d.title || ''}</h3>
                    </div>
                </div>`;
            }).join('');

            dots.innerHTML = data.map((_, i) => `<button onclick="goToSlide(${i})" class="w-2 h-2 rounded-full bg-white/40 hover:bg-white transition-all"></button>`).join('');

            addSliderEvents();
            goToSlide(0);
            startAutoSlide();

            window.addEventListener('resize', () => {
                sliderState.containerWidth = document.getElementById('main-slider').offsetWidth;
            });
        }

        function addSliderEvents() {
            const wrapper = document.getElementById('slider-wrapper');

            wrapper.addEventListener('touchstart', touchStart, { passive: true });
            wrapper.addEventListener('touchmove', touchMove, { passive: false });
            wrapper.addEventListener('touchend', touchEnd);

            wrapper.addEventListener('mousedown', touchStart);
            wrapper.addEventListener('mousemove', touchMove);
            wrapper.addEventListener('mouseup', touchEnd);
            wrapper.addEventListener('mouseleave', touchEnd);
        }

        function touchStart(e) {
            stopAutoSlide();
            sliderState.isDragging = true;
            sliderState.isScrolling = false;
            sliderState.startPos = getPositionX(e);
            sliderState.startY = e.type.includes('mouse')? e.pageY : e.touches[0].clientY;
            sliderState.animationID = requestAnimationFrame(animation);
            document.getElementById('slider-wrapper').style.cursor = 'grabbing';
            document.getElementById('slider-wrapper').style.transition = 'none';
        }

        function touchMove(e) {
            if (!sliderState.isDragging) return;

            const currentX = getPositionX(e);
            const currentY = e.type.includes('mouse')? e.pageY : e.touches[0].clientY;
            const diffX = Math.abs(currentX - sliderState.startPos);
            const diffY = Math.abs(currentY - sliderState.startY);

            // إذا السحب عمودي أكثر من أفقي، خلي الصفحة تسكرول عادي
            if (diffY > diffX && diffY > 10) {
                sliderState.isScrolling = true;
                return;
            }

            // إذا السحب أفقي، امنع السكرول العمودي وحرك السلايدر
            if (diffX > diffY) {
                e.preventDefault();
                const diffPx = currentX - sliderState.startPos;
                const diffPercent = (diffPx / sliderState.containerWidth) * 100;
                sliderState.currentTranslate = sliderState.prevTranslate + diffPercent;
            }
        }

        function touchEnd() {
            if (!sliderState.isDragging) return;
            sliderState.isDragging = false;
            cancelAnimationFrame(sliderState.animationID);
            document.getElementById('slider-wrapper').style.cursor = 'grab';

            // إذا كان عم يسكرول، لا تقلب السلايد
            if (sliderState.isScrolling) {
                sliderState.isScrolling = false;
                startAutoSlide();
                return;
            }

            const movedPercent = sliderState.currentTranslate - sliderState.prevTranslate;

            if (movedPercent < -10 && sliderState.currentSlide < sliderState.totalSlides - 1) {
                sliderState.currentSlide += 1;
            }
            if (movedPercent > 10 && sliderState.currentSlide > 0) {
                sliderState.currentSlide -= 1;
            }

            goToSlide(sliderState.currentSlide);
            startAutoSlide();
        }

        function getPositionX(e) {
            return e.type.includes('mouse')? e.pageX : e.touches[0].clientX;
        }

        function animation() {
            setSliderPosition();
            if (sliderState.isDragging) requestAnimationFrame(animation);
        }

        function setSliderPosition() {
            const wrapper = document.getElementById('slider-wrapper');
            wrapper.style.transform = `translateX(${sliderState.currentTranslate}%)`;
        }

        function goToSlide(index) {
            sliderState.currentSlide = index;
            const wrapper = document.getElementById('slider-wrapper');

            const translatePercent = index * -100;
            sliderState.currentTranslate = translatePercent;
            sliderState.prevTranslate = translatePercent;

            wrapper.style.transition = 'transform 0.3s ease-out';
            wrapper.style.transform = `translateX(${translatePercent}%)`;

            document.querySelectorAll('#slider-dots button').forEach((dot, i) => {
                dot.classList.toggle('bg-white', i === index);
                dot.classList.toggle('bg-white/40', i!== index);
            });
        }

        function startAutoSlide() {
            stopAutoSlide();
            if (sliderState.totalSlides <= 1) return;
            sliderState.autoSlideInterval = setInterval(() => {
                const nextSlide = (sliderState.currentSlide + 1) % sliderState.totalSlides;
                goToSlide(nextSlide);
            }, 5000);
        }

        function stopAutoSlide() {
            if (sliderState.autoSlideInterval) {
                clearInterval(sliderState.autoSlideInterval);
            }
        }

        // ========== باقي الكود ==========
        async function loadContent() {
            const servicesGrid = document.getElementById('services-grid');
            const offersGrid = document.getElementById('offers-grid');

            const { data, error } = await sb.from('content')
      .select('*')
      .eq('type', 'item')
      .in('section', ['services', 'offers'])
      .order('order');

            if (error) {
                servicesGrid.innerHTML = '<p class="text-red-500 col-span-full text-center">فشل تحميل البيانات</p>';
                return console.error(error);
            }

            const services = data.filter(item => item.section === 'services');
            const offers = data.filter(item => item.section === 'offers');

            if (services.length === 0) {
                document.getElementById('services-section').style.display = 'none';
            } else {
                servicesGrid.innerHTML = renderCards(services);
            }

            if (offers.length === 0) {
                document.getElementById('offers-section').style.display = 'none';
            } else {
                offersGrid.innerHTML = renderCards(offers);
            }
        }

        function renderCards(items) {
            return items.map(item => {
                const d = parseValue(item.value);
                return `
                    <div class="premium-card group">
                        <div class="relative overflow-hidden h-80" style="border-radius: 14px 14px 0 0;">
                            <img src="${d.img}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" alt="${d.title}">
                            <div class="absolute inset-0 bg-black/40 group-hover:bg-transparent transition-colors"></div>
                        </div>
                        <div class="p-8">
                            <h3 class="text-xl font-bold mb-4 tracking-wide">${d.title}</h3>
                            <p class="text-gray-500 text-sm mb-8 font-light line-clamp-2">${d.desc}</p>
                            <button onclick="openModal('${item.id}')" class="text-gold text-xs font-bold tracking-[0.2em] border-b border-gold/30 pb-2 hover:border-gold transition-all">
                                VIEW DETAILS —
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function openModal(id) {
            const { data } = await sb.from('content').select('*').eq('id', id).single();
            const d = parseValue(data.value);

            currentItemTitle = d.title || '';
            document.getElementById('modalTitle').textContent = d.title;
            document.getElementById('modalText').textContent = d.details || d.desc;
document.getElementById('modalImg').src = d.img || 'https://raw.githubusercontent.com/Saz-coin/Zaman-alkhier-/refs/heads/main/IMG_20260420_164917.png';
            if (d.price &&!isNaN(parseFloat(d.price))) {
                document.getElementById('newPrice').textContent = formatOMR(d.price);
                document.getElementById('priceBox').style.display = 'block';
            } else {
                document.getElementById('priceBox').style.display = 'none';
            }

            document.getElementById('detailsModal').classList.replace('hidden', 'flex');
        }

        document.getElementById('closeModalBtn').onclick = () => {
            document.getElementById('detailsModal').classList.replace('flex', 'hidden');
        };

        document.getElementById('detailsModal').onclick = (e) => {
            if (e.target.id === 'detailsModal') {
                document.getElementById('detailsModal').classList.replace('flex', 'hidden');
            }
        };
        // قفل المودال بزر ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !document.getElementById('detailsModal').classList.contains('hidden')) {
                document.getElementById('detailsModal').classList.replace('flex', 'hidden');
            }
        });
document.getElementById('whatsappOrderBtn').onclick = (e) => {
    e.preventDefault();
    const msg = `*${currentItemTitle}*\n\nمرحباً زمان الخير، أرغب في الاستفسار عن هذا الصنف.`;
    window.open(`https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
};

// قائمة تواصل معنا
const contactBtn = document.getElementById('contactDropdownBtn');
const contactDropdown = document.getElementById('contactDropdown');

// فتح/إغلاق القائمة
contactBtn.onclick = (e) => {
    e.stopPropagation();
    contactDropdown.classList.toggle('hidden');
};

// سكر القائمة لما يضغط برا
document.addEventListener('click', (e) => {
    if (!contactBtn.contains(e.target) && !contactDropdown.contains(e.target)) {
        contactDropdown.classList.add('hidden');
    }
});
