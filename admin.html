<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم زمان الخير</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #0c0c0c; color: white; padding: 20px; }
     .container { max-width: 1000px; margin: 0 auto; }
     .login-box { background: #121212; padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); max-width: 400px; margin: 100px auto; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; font-family: 'Tajawal', sans-serif; }
        button { padding: 14px; background: #ea580c; border: none; color: white; font-weight: 900; border-radius: 10px; cursor: pointer; margin-top: 10px; font-family: 'Tajawal', sans-serif; }
        button:hover { background: #dc2626; }
     .card { background: #121212; padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; position: relative; }
        h2 { color: #ea580c; margin-bottom: 15px; font-size: 22px; }
        label { display: block; color: #9ca3af; font-size: 13px; margin-top: 12px; margin-bottom: 4px; }
     .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
     .hidden { display: none; }
     .success { background: #059669; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
     .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 10px; }
     .btn-small { background: #1e40af; width: auto; padding: 10px 20px; }
     .btn-danger { background: #7f1d1d; width: auto; padding: 8px 15px; font-size: 12px; }
     .btn-delete { position: absolute; top: 15px; left: 15px; background: #7f1d1d; width: 30px; height: 30px; border-radius: 50%; padding: 0; font-size: 16px; }
     .btn-add { background: #059669; width: 100%; margin-bottom: 20px; font-size: 16px; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-box">
    <h2 style="margin-bottom: 20px;">لوحة تحكم زمان الخير</h2>
    <input type="password" id="passwordInput" placeholder="كلمة السر">
    <button onclick="checkPassword()">دخول</button>
    <p id="errorMsg" style="color: #ef4444; margin-top: 10px; font-size: 13px;"></p>
</div>

<div id="adminPanel" class="container hidden">
    <div class="top-bar">
        <h1 style="font-size: 28px; font-weight: 900;">لوحة التحكم</h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn-small" onclick="window.open('index.html', '_blank')">عرض الموقع</button>
            <button class="btn-small btn-danger" onclick="logout()">خروج</button>
        </div>
    </div>

    <div id="successMsg" class="success hidden">تم الحفظ بنجاح ✅</div>

    <button class="btn-add" onclick="addNewService()">+ إضافة خدمة جديدة</button>

    <div id="servicesContainer"></div>

    <button onclick="saveAllData()" style="font-size: 18px; padding: 18px; width: 100%;">حفظ كل التغييرات</button>
</div>

<script>
const PASSWORD = "zaman2026";

let servicesData = {};

function checkPassword() {
    const input = document.getElementById('passwordInput').value;
    if(input === PASSWORD) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        loadData();
    } else {
        document.getElementById('errorMsg').textContent = 'كلمة السر غلط';
    }
}

function loadData() {
    const saved = localStorage.getItem('zamanData');
    servicesData = saved? JSON.parse(saved) : {
        "buffet": { title: "بوفيه حفلات", desc: "تجهيز كامل للبوفيهات لجميع مناسباتكم", newPrice: "650 ريال", oldPrice: "800 ريال" },
        "slaughter": { title: "الذبائح", desc: "ذبائح طازجة مطهوة على الطريقة التقليدية", newPrice: "1100 ريال", oldPrice: "" },
        "boxes": { title: "بوكساتنا", desc: "مناسبة للشركات والمدارس والفعاليات", newPrice: "400 ريال", oldPrice: "450 ريال" }
    };
    renderServices();
}

function renderServices() {
    const container = document.getElementById('servicesContainer');
    container.innerHTML = '';

    Object.keys(servicesData).forEach(id => {
        const service = servicesData[id];
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <button class="btn-delete" onclick="deleteService('${id}')">✕</button>
            <h2>تعديل الخدمة</h2>
            <label>معرف الخدمة - انجليزي بدون مسافات</label>
            <input type="text" value="${id}" onchange="updateServiceId('${id}', this.value)" placeholder="buffet">
            <label>العنوان</label>
            <input type="text" value="${service.title}" onchange="updateField('${id}', 'title', this.value)">
            <label>الوصف</label>
            <textarea rows="2" onchange="updateField('${id}', 'desc', this.value)">${service.desc}</textarea>
            <div class="grid">
                <div>
                    <label>السعر الجديد</label>
                    <input type="text" value="${service.newPrice}" onchange="updateField('${id}', 'newPrice', this.value)" placeholder="650 ريال">
                </div>
                <div>
                    <label>السعر القديم - فاضي لو مافي خصم</label>
                    <input type="text" value="${service.oldPrice}" onchange="updateField('${id}', 'oldPrice', this.value)" placeholder="800 ريال">
                </div>
            </div>
        `;
        container.appendChild(card);
    });
}

function updateField(id, field, value) {
    servicesData[id][field] = value;
}

function updateServiceId(oldId, newId) {
    if(newId && newId!== oldId &&!servicesData[newId]) {
        servicesData[newId] = servicesData[oldId];
        delete servicesData[oldId];
        renderServices();
    }
}

function addNewService() {
    const newId = 'service_' + Date.now();
    servicesData[newId] = { title: "خدمة جديدة", desc: "", newPrice: "", oldPrice: "" };
    renderServices();
}

function deleteService(id) {
    if(confirm('متأكد تبي تحذف هالخدمة؟')) {
        delete servicesData[id];
        renderServices();
    }
}

function saveAllData() {
    localStorage.setItem('zamanData', JSON.stringify(servicesData));
    const msg = document.getElementById('successMsg');
    msg.classList.remove('hidden');
    setTimeout(() => msg.classList.add('hidden'), 3000);
}

function logout() {
    location.reload();
}

document.getElementById('passwordInput').addEventListener('keypress', e => {
    if(e.key === 'Enter') checkPassword();
});
</script>

</body>
</html>
